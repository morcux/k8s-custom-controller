apiVersion: v1
kind: Namespace
metadata:
  name: morcux-gateway-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: morcux-gateway-role
rules:
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["httproutes"]
  verbs: ["get", "watch", "list", "update"]
- apiGroups: ["discovery.k8s.io"]
  resources: ["endpointslices"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "watch", "list"]

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: morcux-gateway-sa
  namespace: morcux-gateway-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: morcux-gateway-binding
subjects:
- kind: ServiceAccount
  name: morcux-gateway-sa
  namespace: morcux-gateway-system
roleRef:
  kind: ClusterRole
  name: morcux-gateway-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: morcux-gateway-controller
  namespace: morcux-gateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: morcux-gateway
  template:
    metadata:
      labels:
        app: morcux-gateway
    spec:
      serviceAccountName: morcux-gateway-sa
      containers:
      - name: gateway-proxy
        image: gateway-proxy:latest
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 8080
          name: http-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: morcux-gateway-service
  namespace: morcux-gateway-system
spec:
  type: NodePort
  selector:
    app: morcux-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080 