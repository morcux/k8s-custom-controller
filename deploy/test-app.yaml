apiVersion: v1
kind: Namespace
metadata:
  name: test-apps

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: test-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: test-apps
spec:
  selector:
    app: nginx
  ports:
  - protocol: TCP
    port: 80 
    targetPort: 80 